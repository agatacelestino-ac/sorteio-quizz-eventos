<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteio ADVBOX</title>
  <style>
    :root {
      --bg: #08162f;
      --panel: #102446;
      --panel-2: #112b54;
      --border: rgba(122, 184, 255, 0.22);
      --text: #ffffff;
      --muted: #b5d1ff;
      --accent: #3b82f6;
      --accent-2: #60a5fa;
      --danger: #ff6b81;
      --success: #66d19e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.15), transparent 35%),
        linear-gradient(180deg, #091429 0%, #07101f 100%);
      color: var(--text);
      padding: 32px 16px;
    }

    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(16, 36, 70, 0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    .brand {
  display: flex;
  justify-content: center;
  margin-bottom: 26px;
}

.brand-logo {
  width: min(280px, 62%);
  height: auto;
  display: block;
}

.hero-head {
  margin-bottom: 18px;
}

.hero-kicker {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent-2);
  margin-bottom: 10px;
}

h1 {
  font-size: clamp(2.1rem, 5vw, 3.1rem);
  line-height: 1.04;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.event-subtitle {
  font-size: clamp(1.02rem, 2.3vw, 1.32rem);
  font-weight: 700;
  color: #d7e7ff;
  opacity: 0.92;
  line-height: 1.35;
  max-width: 26ch;
}


.panel {
  background: linear-gradient(180deg, rgba(18, 40, 78, 0.94) 0%, rgba(14, 31, 61, 0.96) 100%);
  border: 1px solid rgba(122, 184, 255, 0.18);
  border-radius: 22px;
  padding: 32px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.32);
  backdrop-filter: blur(14px);
}

.field input {
  width: 100%;
  min-height: 56px;
  border-radius: 14px;
  border: 1px solid rgba(122, 184, 255, 0.18);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text);
  padding: 14px 18px;
  font-size: 1rem;
  outline: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
}

.field input:focus {
  border-color: var(--accent-2);
  box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.14);
}

.btn-primary {
  background: linear-gradient(180deg, #4f8dff 0%, #2467e8 100%);
  color: white;
  flex: 1 1 220px;
  box-shadow: 0 10px 24px rgba(36, 103, 232, 0.28);
}

.btn-secondary {
  background: rgba(255, 255, 255, 0.07);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.08);
  flex: 1 1 180px;
}

.result {
  margin-top: 28px;
  padding: 24px;
  background: linear-gradient(180deg, rgba(8, 19, 40, 0.96) 0%, rgba(10, 24, 49, 0.94) 100%);
  border: 1px solid rgba(122, 184, 255, 0.16);
  border-radius: 18px;
  display: none;
}

@media (max-width: 640px) {
  .panel {
    padding: 24px 20px;
    border-radius: 18px;
  }

  .brand-logo {
    width: min(240px, 72%);
  }

  h1 {
    font-size: clamp(1.9rem, 8vw, 2.5rem);
  }

  .event-subtitle {
    font-size: 1rem;
  }

  .sub {
    font-size: 0.98rem;
  }
}


  
    .grid {
      display: grid;
      gap: 16px;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

      .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      min-height: 52px;
      padding: 0 18px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease, background 0.12s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    
    .status {
      min-height: 24px;
      margin-top: 16px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--success);
    }

    
    .result.show {
      display: block;
    }

    .eyebrow {
      color: var(--accent-2);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }

    .winner-number {
      font-size: clamp(2.4rem, 7vw, 4rem);
      font-weight: 900;
      margin-bottom: 8px;
    }

    .winner-name {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      margin-bottom: 18px;
    }

    .meta {
      display: grid;
      gap: 12px;
    }

    .meta-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .meta-label {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .meta-value {
      font-size: 1rem;
      word-break: break-word;
    }
    .meta-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}

.reveal-btn {
  width: 34px;
  height: 34px;
  min-height: 34px;
  border-radius: 10px;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.06);
  color: white;
  font-size: 1rem;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
}

.reveal-btn:hover:not(:disabled) {
  background: rgba(255, 255, 255, 0.12);
  transform: none;
}

.sensitive-value {
  filter: blur(6px);
  user-select: none;
  transition: filter 0.15s ease;
}

.sensitive-value.revealed {
  filter: none;
  user-select: text;
}

  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="brand">
  <img src="advbox-logo.png" alt="ADVBOX" class="brand-logo">
</div>

<div class="hero-head">
  <div class="hero-kicker">Sorteio oficial</div>
  <h1>Sorteio do Kit ADVBOX</h1>
  <div class="event-subtitle" id="draw-event-name">Nome do evento</div>
</div>

<p class="sub">
  Se voc participou do Quizz, este é o seu momento.<br>
  Fique atento. O ganhador seré revelado em instantes.
</p>

      <div class="grid">
        <div class="field">
          <label for="quiz-id">Código do sorteio</label>
          <input id="quiz-id" type="text" value="0ac71938-c36d-4165-970b-630440d33c2b">
        </div>

        <div class="field">
          <label for="draw-pin">PIN do sorteio</label>
          <input id="draw-pin" type="password" placeholder="Digite o PIN">
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" id="draw-btn">Sortear vencedor</button>
        <button class="btn-secondary" id="reset-btn" type="button">Limpar resultado</button>
      </div>

      <div class="status" id="status"></div>

      <div class="result" id="result-card">
        <div class="eyebrow">O ganhador é:</div>
        <div class="winner-number" id="winner-number">00000</div>
        <div class="winner-name" id="winner-name">Nome do participante</div>
        <div class="meta">
        <div class="meta-item">
  <div class="meta-top">
    <span class="meta-label">WhatsApp</span>
    <button class="reveal-btn" type="button" data-target="winner-whatsapp" aria-label="Mostrar WhatsApp">👁</button>
  </div>
  <div class="meta-value sensitive-value" id="winner-whatsapp">-</div>
</div>
<div class="meta-item">
  <div class="meta-top">
    <span class="meta-label">E-mail</span>
    <button class="reveal-btn" type="button" data-target="winner-email" aria-label="Mostrar e-mail">👁</button>
  </div>
  <div class="meta-value sensitive-value" id="winner-email">-</div>
</div>

          <div class="meta-item">
            <span class="meta-label">Data do sorteio</span>
            <div class="meta-value" id="winner-drawn-at">-</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DRAW_WINNER_URL = 'https://nonlpkjdenbmshyugejk.supabase.co/functions/v1/draw-winner';
    let currentEventSlug = '';
let currentEventName = '';
let currentEventId = '';

const EVENT_CONFIG = {
  'ab2l-2026': {
    id: '2931ed30-0be4-4a1b-a512-01aa21d725a6',
    name: 'AB2L LawTech Experience 2026'
  }
};

function getEventSlugFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('event') || '';
  }


    const drawBtn = document.getElementById('draw-btn');
    const resetBtn = document.getElementById('reset-btn');
    const statusEl = document.getElementById('status');
    const resultCard = document.getElementById('result-card');
    const revealButtons = document.querySelectorAll('.reveal-btn');

    currentEventSlug = getEventSlugFromUrl();

if (currentEventSlug && EVENT_CONFIG[currentEventSlug]) {
  currentEventId = EVENT_CONFIG[currentEventSlug].id;
  currentEventName = EVENT_CONFIG[currentEventSlug].name;

  document.getElementById('draw-event-name').textContent = currentEventName;
}


    function setStatus(message, type) {
      statusEl.textContent = message || '';
      statusEl.className = 'status' + (type ? ' ' + type : '');
    }

    function formatDate(isoString) {
      if (!isoString) return '-';
      const date = new Date(isoString);
      return date.toLocaleString('pt-BR', {
        dateStyle: 'short',
        timeStyle: 'medium'
      });
    }

    function showResult(data) {
      document.getElementById('winner-number').textContent = data.number ?? '-';
      document.getElementById('winner-name').textContent = data.name ?? '-';
      document.getElementById('winner-whatsapp').textContent = data.whatsapp ?? '-';
      document.getElementById('winner-email').textContent = data.email ?? '-';
      document.getElementById('winner-whatsapp').classList.remove('revealed');
document.getElementById('winner-email').classList.remove('revealed');

      document.getElementById('winner-drawn-at').textContent = formatDate(data.drawn_at);
      resultCard.classList.add('show');
    }

    function clearResult() {
      resultCard.classList.remove('show');
      setStatus('', '');
    }

    async function drawWinner() {
      const quizId = document.getElementById('quiz-id').value.trim();
      const pin = document.getElementById('draw-pin').value.trim();

      if (!quizId) {
        setStatus('Informe o codigo do evento.', 'error');
        return;
      }

      if (!pin) {
        setStatus('Informe o PIN do sorteio.', 'error');
        return;
      }

      drawBtn.disabled = true;
      drawBtn.textContent = 'Sorteando...';
      setStatus('Consultando participantes e realizando sorteio...', '');

      try {
        const response = await fetch(DRAW_WINNER_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            quiz_id: quizId,
            event_id: currentEventId,
            pin
          })
        });

        const data = await response.json();

        if (!response.ok) {
  setStatus(
    data.debug
      ? (data.error + ' Debug: ' + data.debug)
      : (data.error || 'Nao foi possivel realizar o sorteio.'),
    'error'
  );
  return;
}

        showResult(data);
        setStatus('Sorteio realizado com sucesso.', 'success');
      } catch (error) {
        console.error(error);
        setStatus('Erro ao conectar com o servidor do sorteio.', 'error');
      } finally {
        drawBtn.disabled = false;
        drawBtn.textContent = 'Sortear vencedor';
      }
    }

    drawBtn.addEventListener('click', drawWinner);
    resetBtn.addEventListener('click', clearResult);
    revealButtons.forEach((button) => {
  button.addEventListener('click', () => {
    const targetId = button.getAttribute('data-target');
    const target = document.getElementById(targetId);
    if (target) target.classList.toggle('revealed');
  });
});

  </script>
</body>
</html>
